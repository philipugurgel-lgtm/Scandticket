<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ScandTicket Scanner</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0a0a0f;color:#fff;min-height:100vh}.header{background:#111118;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #222}.header h1{font-size:18px;font-weight:600}.status-dot{width:10px;height:10px;border-radius:50%;display:inline-block}.status-dot.online{background:#22c55e}.status-dot.offline{background:#ef4444}.scanner-area{display:flex;flex-direction:column;align-items:center;padding:20px}#reader{width:100%;max-width:400px;border-radius:12px;overflow:hidden}.result-card{margin:16px;padding:16px;border-radius:12px}.result-card.success{background:#052e16;border:1px solid #22c55e}.result-card.error{background:#2a0a0a;border:1px solid #ef4444}.result-card.warning{background:#2a1a00;border:1px solid #f59e0b}.stats-bar{display:flex;gap:12px;padding:12px 16px;background:#111118;border-top:1px solid #222;position:fixed;bottom:0;left:0;right:0}.stat{flex:1;text-align:center}.stat .num{font-size:20px;font-weight:700}.stat .label{font-size:11px;opacity:.6;text-transform:uppercase}.offline-queue{padding:8px 16px;background:#1a1a2e;font-size:13px;text-align:center}#scan-history{padding:0 16px;max-height:300px;overflow-y:auto}.history-item{padding:10px 0;border-bottom:1px solid #1a1a2e;font-size:13px;display:flex;justify-content:space-between}
</style>
</head>
<body>
<div class="header"><h1>ScandTicket Scanner</h1><div><span class="status-dot" id="statusDot"></span> <span id="statusText" style="font-size:12px"></span></div></div>
<div id="offlineQueue" class="offline-queue" style="display:none"></div>
<div class="scanner-area"><div id="reader"></div><div id="resultArea"></div></div>
<div id="scan-history"></div>
<div class="stats-bar">
<div class="stat"><div class="num" id="statTotal">0</div><div class="label">Scans</div></div>
<div class="stat"><div class="num" id="statSuccess" style="color:#22c55e">0</div><div class="label">OK</div></div>
<div class="stat"><div class="num" id="statDuplicate" style="color:#f59e0b">0</div><div class="label">Dup</div></div>
<div class="stat"><div class="num" id="statError" style="color:#ef4444">0</div><div class="label">Err</div></div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
<script>
const API='/wp-json/scandticket/v1',TOKEN=localStorage.getItem('scandticket_token')||prompt('Enter device token:');
if(TOKEN)localStorage.setItem('scandticket_token',TOKEN);
let stats={total:0,success:0,duplicate:0,error:0},offlineQueue=JSON.parse(localStorage.getItem('scandticket_offline')||'[]');
function updateStatus(){const d=document.getElementById('statusDot'),t=document.getElementById('statusText'),o=navigator.onLine;d.className='status-dot '+(o?'online':'offline');t.textContent=o?'Online':'Offline';showOfflineQueue()}
window.addEventListener('online',()=>{updateStatus();syncOfflineQueue()});window.addEventListener('offline',updateStatus);updateStatus();
const scanner=new Html5Qrcode('reader');
scanner.start({facingMode:'environment'},{fps:10,qrbox:{width:250,height:250}},onScan,()=>{}).catch(e=>{document.getElementById('reader').innerHTML='<p style="padding:40px;text-align:center;color:#f59e0b">Camera required.<br>'+e+'</p>'});
let lastScan='',lastTime=0;
async function onScan(decoded){if(decoded===lastScan&&Date.now()-lastTime<3000)return;lastScan=decoded;lastTime=Date.now();let qr;try{qr=JSON.parse(decoded)}catch{show('error','Invalid QR','Parse error');stats.error++;updateStats();return}stats.total++;updateStats();if(!navigator.onLine){offlineQueue.push(qr);localStorage.setItem('scandticket_offline',JSON.stringify(offlineQueue));show('warning','Queued Offline','#'+qr.t);showOfflineQueue();return}try{const r=await fetch(API+'/scan',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+TOKEN},body:JSON.stringify(qr)}),d=await r.json();if(r.status===202){stats.success++;show('success','Checked In','#'+qr.t);addHist(qr.t,'ok');if(navigator.vibrate)navigator.vibrate(100)}else if(d.code==='duplicate_scan'){stats.duplicate++;show('warning','Already Scanned','#'+qr.t);addHist(qr.t,'dup');if(navigator.vibrate)navigator.vibrate([100,50,100])}else{stats.error++;show('error','Denied',d.message||'Error');addHist(qr.t,'err');if(navigator.vibrate)navigator.vibrate([200,100,200])}}catch{offlineQueue.push(qr);localStorage.setItem('scandticket_offline',JSON.stringify(offlineQueue));show('warning','Queued','Network error');showOfflineQueue()}updateStats()}
function show(t,h,m){document.getElementById('resultArea').innerHTML='<div class="result-card '+t+'"><h3>'+h+'</h3><p>'+m+'</p></div>';setTimeout(()=>{document.getElementById('resultArea').innerHTML=''},4000)}
function updateStats(){document.getElementById('statTotal').textContent=stats.total;document.getElementById('statSuccess').textContent=stats.success;document.getElementById('statDuplicate').textContent=stats.duplicate;document.getElementById('statError').textContent=stats.error}
function addHist(t,s){document.getElementById('scan-history').innerHTML='<div class="history-item"><span>#'+t+' — '+s+'</span><span>'+new Date().toLocaleTimeString()+'</span></div>'+document.getElementById('scan-history').innerHTML}
function showOfflineQueue(){const e=document.getElementById('offlineQueue');if(offlineQueue.length>0){e.style.display='block';e.textContent=offlineQueue.length+' queued offline'}else e.style.display='none'}
async function syncOfflineQueue(){if(!offlineQueue.length)return;const b=[...offlineQueue];offlineQueue=[];localStorage.setItem('scandticket_offline','[]');try{await fetch(API+'/scan/batch',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+TOKEN},body:JSON.stringify({scans:b})})}catch{offlineQueue=[...offlineQueue,...b];localStorage.setItem('scandticket_offline',JSON.stringify(offlineQueue))}showOfflineQueue()}
let ws;function connectWS(){try{const p=location.protocol==='https:'?'wss':'ws';ws=new WebSocket(p+'://'+location.hostname+':8090');ws.onmessage=e=>{const m=JSON.parse(e.data);if(m.type==='ping')ws.send(JSON.stringify({type:'pong'}))};ws.onclose=()=>setTimeout(connectWS,5000)}catch{}}connectWS();
</script>
</body>
</html>
